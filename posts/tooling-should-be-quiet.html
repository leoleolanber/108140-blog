            <h1>工具链应该安静地工作</h1>
            <div class="post-meta">
              <time datetime="2026-06-05">2026.06.05</time>
              <span>4 min</span>
              <span>工具 / 效率</span>
            </div>
          </div>

        <div class="prose">
          <p>
            好工具的存在感应该来自结果，而不是噪音。它让你更快进入状态，也更容易在明天继续昨天的工作。
          </p>

          <h2>少一点仪式感</h2>
          <p>
            工具链越复杂，越需要把常用路径压短。写文章、预览、提交、部署，最好都能以清楚的方式重复执行。
          </p>

          <h2>多一点可解释性</h2>
          <p>
            轻量不等于随意。目录结构、命名、部署方式都应该让未来的自己一眼看懂。
          </p>

          <h2>让维护成本保持低位</h2>
          <p>
            对个人博客来说，长期稳定比一时新鲜更重要。能被持续使用的工具，才真正值得留下。
          </p>
