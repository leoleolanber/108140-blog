<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>66zhang 写作后台</title>
    <link rel="stylesheet" href="admin.css" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]]
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
        }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="workspace">
        <div class="workspace-brand">
          <span>66</span>
          <div>
            <strong>blog.66zhang.cn</strong>
            <small>本地写作后台</small>
          </div>
        </div>

        <div class="workspace-stats" aria-label="文章统计">
          <div>
            <span>文章</span>
            <strong id="post-count">0</strong>
          </div>
          <div>
            <span>状态</span>
            <strong id="save-state">就绪</strong>
          </div>
        </div>

        <button id="new-post" class="new-button" type="button">新建文章</button>

        <label class="sidebar-search">
          <span>筛选文章</span>
          <input id="post-filter" type="search" placeholder="标题、标签、日期" />
        </label>

        <div id="post-list" class="post-list" aria-label="文章列表"></div>
      </aside>

      <main class="editor-shell">
        <header class="editor-topbar">
          <div>
            <p>Markdown + LaTeX CMS</p>
            <h1>技术文章编辑器</h1>
          </div>
          <div class="topbar-actions">
            <a class="ghost-link" href="/site/index.html" target="_blank" rel="noreferrer">预览站点</a>
            <button id="build-site" class="ghost-button" type="button">生成 HTML</button>
            <button id="publish-site" class="publish-button" type="button">发布</button>
          </div>
        </header>

        <section class="meta-panel" aria-label="文章信息">
          <label>
            <span>标题</span>
            <input id="title" type="text" placeholder="例如：DNS 解析排障笔记" />
          </label>
          <label>
            <span>Slug</span>
            <input id="slug" type="text" placeholder="dns-debug-note" />
          </label>
          <label>
            <span>日期</span>
            <input id="date" type="date" />
          </label>
          <label>
            <span>标签</span>
            <input id="tags" type="text" placeholder="网络, Linux, 云服务" />
          </label>
          <label class="summary-field">
            <span>摘要</span>
            <input id="summary" type="text" placeholder="首页卡片和 RSS 中显示的一句话摘要" />
          </label>
          <label class="featured-toggle">
            <input id="featured" type="checkbox" />
            <span>置顶</span>
          </label>
        </section>

        <section class="workbench">
          <div class="editor-pane">
            <div class="pane-head">
              <div>
                <span>Markdown</span>
                <strong id="current-slug">未命名文章</strong>
              </div>
              <button id="save-post" type="button">保存</button>
            </div>

            <div class="markdown-toolbar" aria-label="Markdown 快捷插入">
              <button type="button" data-insert="h2">H2</button>
              <button type="button" data-insert="code">Code</button>
              <button type="button" data-insert="math">Math</button>
              <button type="button" data-insert="table">Table</button>
              <button type="button" data-insert="quote">Quote</button>
            </div>

            <textarea id="body" spellcheck="false" placeholder="在这里写 Markdown + LaTeX。支持 $E=mc^2$ 和 $$...$$。"></textarea>

            <div class="editor-status">
              <span id="word-count">0 字</span>
              <span id="draft-state">未修改</span>
            </div>
          </div>

          <div class="preview-pane">
            <div class="pane-head">
              <div>
                <span>Preview</span>
                <strong id="preview-updated">等待预览</strong>
              </div>
              <button id="refresh-preview" type="button">刷新预览</button>
            </div>
            <article id="preview" class="preview prose"></article>
          </div>
        </section>

        <section class="publish-console" aria-label="发布日志">
          <div>
            <span>发布日志</span>
            <strong id="console-state">等待操作</strong>
          </div>
          <pre id="publish-log">等待操作</pre>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script src="admin.js"></script>
  </body>
</html>
