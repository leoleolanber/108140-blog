title: blog.66zhang.cn
subtitle: 信息技术博客
description: 分享网络、Linux、云服务、开发工具、安全排障、数学和 AI 应用的技术博客。
keywords: 信息技术,网络,Linux,云服务,安全,AI,数学,Markdown,LaTeX
author: 66zhang
language: zh-CN
timezone: Asia/Shanghai

url: https://blog.66zhang.cn
root: /
permalink: posts/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false

theme: landscape

index_generator:
  path: ""
  per_page: 10
  order_by: -date

archive_generator:
  per_page: 20
  yearly: true
  monthly: true
  daily: false

tag_generator:
  per_page: 20

category_generator:
  per_page: 20

feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true
  content_limit: 140
  content_limit_delim: " "
  order_by: -date

sitemap:
  path: sitemap.xml

markdown:
  preset: default
  render:
    html: false
    xhtmlOut: false
    breaks: false
    linkify: true
    typographer: true
  plugins:
    - name: "@renbaoshuo/markdown-it-katex"
      options:
        skipDelimitersCheck: true
  anchors:
    level: 2
    collisionSuffix: v
    permalink: true
    permalinkClass: header-anchor
    permalinkSymbol: "#"
